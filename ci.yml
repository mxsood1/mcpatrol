name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint check (syntax only)
        run: python -m compileall mcpatrol
      - name: Test
        run: pytest -q
      - name: Demo report renders
        run: |
          mcpatrol --demo --no-open --output /tmp/demo.html
          test -s /tmp/demo.html
